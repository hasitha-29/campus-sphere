<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CampusSphere</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e2d4a;
            --accent: #3b72b0;
            --accent-hover: #2e4070;
            --background: #f5f7fa;
        }
        body { 
            background-color: var(--background); 
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        .login-card { 
            border: none; 
            border-radius: 1.25rem; 
            box-shadow: 0 1rem 3rem rgba(0, 0, 0, 0.1); 
        }
        .bg-navy { background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%); }
        .text-navy { color: var(--primary); }
        .btn-navy { 
            background-color: var(--accent); 
            color: white; 
            border: none;
            transition: all 0.3s ease;
        }
        .btn-navy:hover { 
            background-color: var(--accent-hover); 
            color: white; 
            transform: translateY(-2px);
            box-shadow: 0 0.5rem 1rem rgba(37, 99, 235, 0.2);
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.25);
        }
    </style>
</head>
<body class="d-flex align-items-center min-vh-100">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">
                <div class="card login-card overflow-hidden">
                    <div class="bg-navy text-white text-center py-5 position-relative">
                        <!-- Abstract overlay -->
                        <div class="position-absolute top-0 start-0 w-100 h-100" style="background: linear-gradient(45deg, rgba(255,255,255,0.1), transparent); pointer-events: none;"></div>
                        <h3 class="fw-bold mb-1 position-relative z-1">CampusSphere</h3>
                        <p class="small mb-0 opacity-75 position-relative z-1">Smart Campus Resource Management</p>
                    </div>
                    
                    <div class="card-body p-4 p-md-5 bg-white">
                        <h4 class="text-center mb-4 fw-bold text-navy">Welcome Back</h4>
                        
                        <!-- Django Error Handling Messages -->
                        {% if messages %}
                            {% for message in messages %}
                                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                                    <i class="bi bi-exclamation-circle me-2"></i>{{ message }}
                                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                                </div>
                            {% endfor %}
                        {% endif %}

                        <form method="POST" action="{% url 'login' %}">
                            {% csrf_token %}
                            
                            <div class="mb-4">
                                <label for="username" class="form-label fw-semibold text-secondary">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-person text-muted"></i></span>
                                    <input type="text" class="form-control form-control-lg border-start-0 ps-0 bg-light" id="username" name="username" required placeholder="Enter your username">
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                                    <input type="password" class="form-control form-control-lg border-start-0 ps-0 bg-light" id="password" name="password" required placeholder="Enter your password">
                                </div>
                            </div>
                            
                            <div class="mb-5">
                                <label for="role" class="form-label fw-semibold text-secondary">Login As</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-lock text-muted"></i></span>
                                    <select class="form-select form-select-lg border-start-0 ps-0 bg-light" id="role" name="role" required>
                                        <option value="student" selected>Student</option>
                                        <option value="admin">Administrator</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div class="d-grid mb-4">
                                <button type="submit" class="btn btn-navy btn-lg fw-bold rounded-pill">Secure Login <i class="bi bi-arrow-right ms-2"></i></button>
                            </div>
                            
                            <div class="text-center mt-4 border-top pt-4">
                                <span class="text-muted">New student?</span> 
                                <a href="{% url 'register' %}" class="text-decoration-none fw-bold text-navy hover-link">Register here</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

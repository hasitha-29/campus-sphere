<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply for Leave - CampusSphere</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-mid: #1e293b;
            --primary-light: #1e3a8a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --surface: #ffffff;
            --background: #f8fafc;
            --border-color: #e2e8f0;
            --border-soft: #f1f5f9;
            --text-main: #0f172a;
            --text-mid: #475569;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --success: #10b981; --success-bg: #d1fae5;
            --warning: #f59e0b; --warning-bg: #fef3c7;
            --danger: #ef4444;  --danger-bg: #fee2e2;
            --shadow-sm: 0 1px 3px rgba(15,23,42,0.06);
            --shadow-md: 0 4px 16px rgba(15,23,42,0.08);
        }

        body {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
            background-attachment: fixed;
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            -webkit-font-smoothing: antialiased;
        }

        /* Top Navbar */
        .saas-navbar {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 0;
            box-shadow: 0 1px 2px rgba(0,0,0,0.02);
        }
        .brand-logo {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 800;
            margin-right: 12px;
        }

        /* Premium Form Card */
        .premium-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            margin-top: 40px;
        }
        .card-header-premium {
            background-color: var(--surface);
            border-bottom: 1px solid var(--border-soft);
            padding: 24px 32px;
        }
        .card-header-premium h4 {
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
            margin: 0;
        }
        
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        .form-control {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.95rem;
            color: var(--text-main);
            background-color: var(--background);
            transition: all 0.2s;
        }
        .form-control:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            background-color: var(--surface);
        }
        
        .btn-primary-saas {
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-weight: 600;
            letter-spacing: 0.3px;
            transition: all 0.2s;
        }
        .btn-primary-saas:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }
    
        /* ── Unified Navy Topbar (Student) ── */
        .topbar, .navbar, header.topbar {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%) !important;
            border-bottom: none !important;
        }
        .topbar .navbar-brand, .topbar h4, .topbar .brand-name { color: white !important; }
        .topbar .btn-outline-secondary, .topbar .btn { border-color: rgba(255,255,255,0.2) !important; color: rgba(255,255,255,0.85) !important; }
        .topbar .btn:hover { background: rgba(255,255,255,0.15) !important; color: white !important; }
        
        /* ── Unified Card + Button styles ── */
        .btn-primary, .btn-accent {
            background: #2563eb !important;
            border-color: #2563eb !important;
            color: white !important;
        }
        .btn-primary:hover { background: #1d4ed8 !important; border-color: #1d4ed8 !important; transform: translateY(-1px); }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
        }
        </style>
    <link rel="stylesheet" href="{% static 'css/campus.css' %}">
</head>
<body>

<nav class="navbar topbar py-3 shadow-sm">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <div class="d-flex flex-column align-items-center text-center me-3">
                <div class="brand-logo" style="margin-right: 0; margin-bottom: 2px;">CS</div>
                <span class="fw-bold" style="color: white; letter-spacing: -0.5px; font-size: 0.8rem; line-height: 1;">CampusSphere</span>
            </div>
            <span class="badge" style="background-color: rgba(255,255,255,0.15); color: #ffffff; font-weight: 600;">Student</span>
        </div>
        <div class="d-flex gap-2">
            <a href="{% url 'student_dashboard' %}" class="btn btn-sm btn-outline-light fw-semibold" style="border-radius: 8px;">Dashboard</a>
            <a href="{% url 'my_leaves' %}" class="btn btn-sm btn-outline-light fw-semibold" style="border-radius: 8px;">My Leaves</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            {% if messages %}
                <div class="mt-4">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert" style="border-radius: 12px; border: none; box-shadow: var(--shadow-card);">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
                </div>
            {% endif %}

            <div class="premium-card">
                <div class="card-header-premium">
                    <h4>Request Absence</h4>
                    <p class="text-muted mb-0 mt-1" style="font-size: 0.9rem;">Submit your leave details for administrative review.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form action="{% url 'apply_leave' %}" method="POST">
                        {% csrf_token %}
                        <div class="row mb-4">
                            <div class="col-md-6 mb-3 mb-md-0">
                                <label for="from_date" class="form-label">Start Date</label>
                                <input type="date" class="form-control" id="from_date" name="from_date" required>
                            </div>
                            <div class="col-md-6">
                                <label for="to_date" class="form-label">End Date</label>
                                <input type="date" class="form-control" id="to_date" name="to_date" required>
                            </div>
                        </div>
                        
                        <div class="mb-5">
                            <label for="reason" class="form-label">Detailed Reason</label>
                            <textarea class="form-control" id="reason" name="reason" rows="4" placeholder="Please provide a clear reason for your absence..." required></textarea>
                        </div>
                        
                        <div class="d-flex justify-content-end gap-3 border-top pt-4">
                            <a href="{% url 'student_dashboard' %}" class="btn btn-light fw-semibold text-muted" style="border-radius: 10px; padding: 12px 24px;">Cancel</a>
                            <button type="submit" class="btn btn-primary-saas">
                                Submit Request <i class="bi bi-arrow-right ms-1"></i>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const today = new Date().toISOString().split('T')[0];
        const fromDateInput = document.getElementById('from_date');
        const toDateInput = document.getElementById('to_date');
        
        fromDateInput.setAttribute('min', today);
        toDateInput.setAttribute('min', today);
        
        fromDateInput.addEventListener('change', function() {
            toDateInput.setAttribute('min', this.value);
            if(toDateInput.value && toDateInput.value < this.value) {
                toDateInput.value = '';
            }
        });
    });
</script>
</body>
</html>

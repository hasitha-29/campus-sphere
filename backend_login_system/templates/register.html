<!DOCTYPE html>
<html lang="en">
<head>
    {% load static %}
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - CampusSphere</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a;
            --primary-mid: #1e293b;
            --primary-light: #1e3a8a;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --accent-soft: #eff6ff;
            --surface: #ffffff;
            --background: #f8fafc;
            --border-color: #e2e8f0;
            --border-soft: #f1f5f9;
            --text-main: #0f172a;
            --text-mid: #475569;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --success: #10b981; --success-bg: #d1fae5;
            --warning: #f59e0b; --warning-bg: #fef3c7;
            --danger: #ef4444;  --danger-bg: #fee2e2;
            --shadow-sm: 0 1px 3px rgba(15,23,42,0.06);
            --shadow-md: 0 4px 16px rgba(15,23,42,0.08);
        }
        body { background-color: var(--background); font-family: 'Inter', sans-serif; }
        .card-custom { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .bg-navy { background: linear-gradient(135deg, var(--primary) 0%, #1e3a8a 100%) !important; color: white; }
        .btn-navy { background-color: var(--accent); color: white; border-radius: 8px; transition: all 0.2s; border: none; }
        .btn-navy:hover { background-color: #1d4ed8; color: white; transform: translateY(-1px); }
    
        /* ── Unified Card + Button styles ── */
        .btn-primary, .btn-accent {
            background: #2563eb !important;
            border-color: #2563eb !important;
            color: white !important;
        }
        .btn-primary:hover { background: #1d4ed8 !important; border-color: #1d4ed8 !important; transform: translateY(-1px); }
        .form-control:focus, .form-select:focus {
            border-color: #2563eb !important;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
        }
        </style>
    <link rel="stylesheet" href="{% static 'css/campus.css' %}">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}

            <div class="card card-custom">
                <div class="card-header bg-navy text-center py-4" style="border-radius: 12px 12px 0 0;">
                    <h3 class="mb-0 fw-bold">CampusSphere</h3>
                    <p class="mb-0 text-light mt-1">Create Student Account</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form action="{% url 'register' %}" method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="username" class="form-label fw-semibold text-secondary">Username</label>
                            <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Enter username" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="email" class="form-label fw-semibold text-secondary">Email Address</label>
                            <input type="email" class="form-control form-control-lg" id="email" name="email" placeholder="Enter email address" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="password" class="form-label fw-semibold text-secondary">Password</label>
                            <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Create password" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="confirm_password" class="form-label fw-semibold text-secondary">Confirm Password</label>
                            <input type="password" class="form-control form-control-lg" id="confirm_password" name="confirm_password" placeholder="Confirm password" required>
                        </div>
                        
                        <div class="d-grid mb-3">
                            <button type="submit" class="btn btn-navy btn-lg fw-bold">Register as Student</button>
                        </div>
                        
                        <div class="text-center mt-3">
                            <span class="text-muted">Already have an account?</span> 
                            <a href="{% url 'login' %}" class="text-decoration-none fw-bold" style="color: #0a2540;">Login here</a>
                        </div>
                    </form>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
